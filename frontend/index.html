<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coding Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 18px; font-weight: 600; }
    #header span { background: #238636; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
    .user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
    .assistant { align-self: flex-start; background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 4px; width: 80%; }
    .assistant pre { margin: 8px 0; border-radius: 8px; overflow-x: auto; }
    .assistant code { font-family: 'Consolas', monospace; font-size: 13px; }
    .assistant p { margin: 4px 0; }
    #input-area { padding: 16px 24px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 12px; }
    #input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; color: #e6edf3; font-size: 14px; resize: none; height: 48px; outline: none; }
    #input:focus { border-color: #1f6feb; }
    #send { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 0 20px; cursor: pointer; font-size: 14px; font-weight: 600; }
    #send:hover { background: #2ea043; }
    #send:disabled { background: #30363d; cursor: not-allowed; }
    .typing { color: #8b949e; font-style: italic; font-size: 13px; }
    #status { width: 8px; height: 8px; border-radius: 50%; background: #238636; }
  </style>
</head>
<body>
  <div id="header">
    <div id="status"></div>
    <h1>Coding Assistant</h1>
    <span>Offline</span>
  </div>
  <div id="messages">
    <div class="message assistant">
      <p>Hi! I'm your offline coding assistant. Ask me anything about programming.</p>
    </div>
  </div>
  <div id="input-area">
    <textarea id="input" placeholder="Ask a coding question..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'assistant') {
        div.innerHTML = formatResponse(text);
        div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function formatResponse(text) {
      return text
        .replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="language-${lang || 'python'}">${code.trim()}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      send.disabled = true;

      const div = addMessage('', 'assistant');
      div.innerHTML = '<span class="typing">Thinking...</span>';

      try {
        const res = await fetch('http://127.0.0.1:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';

        div.innerHTML = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value);
          div.innerHTML = formatResponse(full);
          messages.scrollTop = messages.scrollHeight;
        }
        div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      } catch (e) {
        div.innerHTML = '<span style="color:#f85149">Error: Could not connect to backend.</span>';
      }
      send.disabled = false;
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
